<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · VIBRATIONS 2027</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap');

    :root {
      --gold: #C9A84C;
      --gold2: #E8C96B;
      --crimson: #7A1C1C;
      --dark: #080404;
      --dark2: #120C0C;
      --dark3: #1C1010;
      --smoke: #F2E8D9;
      --smoke2: #D9C9B0;
      --muted: #8C7A65;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 50%, #2d1010 0%, #120808 50%, #080404 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Cormorant Garamond", serif;
      color: var(--smoke);
    }

    .login-logo {
      margin-bottom: 2rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeInDown 1s ease-out;
    }

    .login-logo img {
      height: 60px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(201, 168, 76, 0.3));
    }

    .login-logo .logo-text {
      display: flex;
      flex-direction: column;
    }

    .login-logo .nb-name {
      font-family: "Cinzel Decorative", cursive;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      line-height: 1;
    }

    .login-logo .nb-sub {
      font-family: "Cinzel", serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
      color: var(--smoke2);
      opacity: 0.8;
    }

    .vib-login-root {
      width: 100%;
      max-width: 450px;
      background: rgba(18, 12, 12, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 12px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .vib-hd {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(201, 168, 76, .025) 0, rgba(201, 168, 76, .025) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(-45deg, rgba(201, 168, 76, .025) 0, rgba(201, 168, 76, .025) 1px, transparent 1px, transparent 40px);
      pointer-events: none;
      opacity: 0.5;
    }

    .vib-cnt {
      position: relative;
      z-index: 1;
    }

    .vib-title-wrap {
      text-align: center;
      margin-bottom: 2rem;
    }

    .vib-top-sub {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .vib-main-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.2rem;
      margin: 0.5rem 0;
      background: linear-gradient(to bottom, var(--gold2), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
    }

    .vib-btm-sub {
      font-size: 0.9rem;
      color: var(--muted);
      font-style: italic;
    }

    .vib-tabs {
      display: flex;
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      margin-bottom: 2rem;
    }

    .vib-tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--muted);
      position: relative;
    }

    .vib-tab.active {
      color: var(--gold);
    }

    .vib-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
    }

    .vib-form-group {
      margin-bottom: 1.5rem;
    }

    .vib-label {
      display: block;
      font-size: 0.7rem;
      font-family: 'Cinzel', serif;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .vib-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.2);
      padding: 0.8rem 1rem;
      color: var(--smoke);
      font-family: 'DM Sans', sans-serif;
      border-radius: 4px;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .vib-input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 15px rgba(201, 168, 76, 0.1);
    }

    .vib-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.75rem;
    }

    .vib-remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
    }

    .vib-forgot {
      color: var(--muted);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
      transition: color 0.3s;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 0.75rem;
      padding: 0;
    }

    .vib-forgot:hover {
      color: var(--gold);
    }

    .vib-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(45deg, #422a18, #2d1b0f);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.4s;
      text-transform: uppercase;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .vib-btn:hover:not(:disabled) {
      background: var(--gold);
      color: var(--dark);
      box-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
      transform: translateY(-2px);
    }

    .vib-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .vib-sep {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 1px;
    }

    .vib-sep::before,
    .vib-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(201, 168, 76, 0.15);
      margin: 0 1rem;
    }

    .vib-google {
      width: 100%;
      padding: 0.8rem;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--smoke2);
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .vib-google:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .vib-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .vib-footer span {
      color: var(--gold);
      cursor: pointer;
      margin-left: 0.3rem;
    }

    .vib-msg {
      padding: 0.8rem;
      margin-bottom: 1.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s;
    }

    .vib-msg.success {
      background: rgba(0, 255, 0, 0.1);
      color: #8f8;
      border: 1px solid rgba(0, 255, 0, 0.2);
    }

    .vib-msg.error {
      background: rgba(255, 0, 0, 0.1);
      color: #f88;
      border: 1px solid rgba(255, 0, 0, 0.2);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .csb {
      font-family: "Cinzel", serif;
      font-size: .7rem;
      letter-spacing: .3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 1rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .csb::before,
    .csb::after {
      content: " ✦ ";
    }

    .cd {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .cdb {
      text-align: center;
      padding: 0.8rem 0.5rem;
      background: rgba(201, 168, 76, .04);
      border: 1px solid rgba(201, 168, 76, .15);
      flex: 1;
    }

    .cdb+.cdb {
      border-left: none;
    }

    .cdn {
      font-family: "Cinzel Decorative", serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold2);
      line-height: 1;
      display: block;
    }

    .cdl {
      font-family: "DM Sans", sans-serif;
      font-size: .5rem;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: .4rem;
      display: block;
    }

    .cds {
      font-family: "Cinzel Decorative", serif;
      font-size: 1.2rem;
      color: var(--gold);
      padding: 0 .15rem 0.6rem;
      opacity: .4;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: .4;
      }

      50% {
        opacity: .1;
      }
    }
  </style>
</head>

<body>

  <a href="index.html" class="login-logo">
    <div class="logo-text">
      <span class="nb-name">VIBRATIONS</span>
      <span class="nb-sub">Anchorage · Shivaji College</span>
    </div>
  </a>

  <div class="vib-login-root">
    <div class="vib-hd"></div>
    <div class="vib-cnt">
      <div class="vib-title-wrap">
        <span class="vib-top-sub">Annual Cultural Festival · 2027</span>
        <h1 class="vib-main-title">VIBRATIONS</h1>
        <div class="vib-btm-sub">Shivaji College · Delhi University</div>
      </div>

      <div class="csb">Coming Soon in 2027</div>
      <div class="cd">
        <div class="cdb"><span class="cdn" id="cd-d">000</span><span class="cdl">Days</span></div>
        <span class="cds">:</span>
        <div class="cdb"><span class="cdn" id="cd-h">00</span><span class="cdl">Hours</span></div>
        <span class="cds">:</span>
        <div class="cdb"><span class="cdn" id="cd-m">00</span><span class="cdl">Mins</span></div>
        <span class="cds">:</span>
        <div class="cdb"><span class="cdn" id="cd-s">00</span><span class="cdl">Secs</span></div>
      </div>

      <div class="vib-tabs">
        <div class="vib-tab active" id="tab-login" onclick="setMode('login')">Sign In</div>
        <div class="vib-tab" id="tab-signup" onclick="setMode('signup')">Register</div>
      </div>

      <div id="vib-msg" class="vib-msg"></div>

      <form id="vib-form" onsubmit="handleSubmit(event)">
        <div id="signup-fields" style="display: none;">
          <div class="vib-form-group">
            <label class="vib-label">Full Name</label>
            <input type="text" id="inp-name" class="vib-input" placeholder="Your name">
          </div>
        </div>

        <div class="vib-form-group">
          <label class="vib-label">Email Address</label>
          <input type="email" id="inp-email" class="vib-input" placeholder="you@example.com" required>
        </div>

        <div class="vib-form-group">
          <label class="vib-label">Password</label>
          <input type="password" id="inp-password" class="vib-input" placeholder="Enter password" required>
        </div>

        <div id="signup-confirm" style="display: none;">
          <div class="vib-form-group">
            <label class="vib-label">Confirm Password</label>
            <input type="password" id="inp-pass2" class="vib-input" placeholder="Repeat password">
          </div>
        </div>

        <div class="vib-options" id="login-options">
          <label class="vib-remember">
            <input type="checkbox"> Remember me
          </label>
          <!-- FIX: was href="#" onclick="forgotPassword()" which caused page reload;
               now a button so it doesn't submit the form or navigate -->
          <button type="button" class="vib-forgot" onclick="forgotPassword()">Forgot Password?</button>
        </div>

        <button type="submit" class="vib-btn" id="btn-submit">Enter the Festival</button>
      </form>

      <div class="vib-sep">or continue with</div>

      <button class="vib-google" onclick="googleSignIn()">Google Account</button>

      <div class="vib-footer" id="mode-footer">
        New to Vibrations? <span onclick="setMode('signup')">Create an account</span>
      </div>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      "https://ewqqnnmgwwlycbuytthi.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3cXFubm1nd3dseWNidXl0dGhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDk5NzUsImV4cCI6MjA5MjE4NTk3NX0.mRMk87rKtYSdzWfP-jbGzPZqdW5jG5UHDc-acIxbN-Y"
    );

    let mode = 'login';

    function setMode(m) {
      mode = m;
      const loginTab = document.getElementById('tab-login');
      const signupTab = document.getElementById('tab-signup');
      const signupFields = document.getElementById('signup-fields');
      const signupConfirm = document.getElementById('signup-confirm');
      const loginOptions = document.getElementById('login-options');
      const btnSubmit = document.getElementById('btn-submit');
      const footer = document.getElementById('mode-footer');

      // Clear any lingering messages when switching tabs
      hideMsg();

      if (mode === 'login') {
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        signupFields.style.display = 'none';
        signupConfirm.style.display = 'none';
        loginOptions.style.display = 'flex';
        btnSubmit.textContent = 'Enter the Festival';
        footer.innerHTML = 'New to Vibrations? <span onclick="setMode(\'signup\')">Create an account</span>';
      } else {
        loginTab.classList.remove('active');
        signupTab.classList.add('active');
        signupFields.style.display = 'block';
        signupConfirm.style.display = 'block';
        loginOptions.style.display = 'none';
        btnSubmit.textContent = 'Join the Journey';
        footer.innerHTML = 'Already registered? <span onclick="setMode(\'login\')">Sign in instead</span>';
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('vib-msg');
      msg.textContent = text;
      msg.className = 'vib-msg ' + type;
      msg.style.display = 'block';
    }

    function hideMsg() {
      const msg = document.getElementById('vib-msg');
      msg.style.display = 'none';
    }

    function setLoading(loading) {
      // FIX: disable the submit button while an async request is in flight
      // to prevent double-submits
      const btn = document.getElementById('btn-submit');
      btn.disabled = loading;
      btn.textContent = loading
        ? 'Please wait…'
        : (mode === 'login' ? 'Enter the Festival' : 'Join the Journey');
    }

    async function handleSubmit(e) {
      e.preventDefault();

      const email = document.getElementById('inp-email').value.trim();
      const pass = document.getElementById('inp-password').value;

      if (!email || !pass) {
        showMsg('Please fill in all required fields.', 'error');
        return;
      }

      if (mode === 'signup') {
        const name = document.getElementById('inp-name').value.trim();
        const pass2 = document.getElementById('inp-pass2').value;

        // FIX: validate that the name field is filled on signup
        if (!name) {
          showMsg('Please enter your full name.', 'error');
          return;
        }

        // FIX: validate password confirmation match
        if (pass !== pass2) {
          showMsg('Passwords do not match.', 'error');
          return;
        }

        // FIX: enforce a minimum password length (Supabase default is 6)
        if (pass.length < 6) {
          showMsg('Password must be at least 6 characters.', 'error');
          return;
        }

        setLoading(true);
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password: pass,
          options: {
            // FIX: pass the display name into user metadata so it's stored
            data: { full_name: name }
          }
        });
        setLoading(false);

        if (error) {
          showMsg(error.message, 'error');
        } else {
          showMsg('Signup successful! Check your email for a confirmation link.', 'success');
        }

      } else {
        setLoading(true);
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password: pass
        });
        setLoading(false);

        if (error) {
          showMsg('Invalid email or password.', 'error');
        } else {
          showMsg('Login successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }
      }
    }

    async function forgotPassword() {
      // FIX: was a no-op stub; now calls Supabase's actual password reset API
      const email = document.getElementById('inp-email').value.trim();
      if (!email) {
        showMsg('Enter your email above to reset your password.', 'error');
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        // FIX: redirectTo must point to a page where the user can enter their
        // new password (Supabase appends an access_token hash to this URL)
        redirectTo: window.location.origin + '/reset-password.html'
      });

      if (error) {
        showMsg(error.message, 'error');
      } else {
        showMsg('Password reset link sent to ' + email, 'success');
      }
    }

    aasync function googleSignIn() {
  const { data, error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://vibration.space/index.html" // 👈 CHANGE THIS
    }
  });

  if (error) {
    showMsg(error.message, 'error');
  }
}

    // Countdown timer
    function tick() {
      const d = new Date('2027-03-01T00:00:00') - new Date();
      if (d <= 0) return;
      const dd = Math.floor(d / 864e5);
      const h = Math.floor(d % 864e5 / 36e5);
      const m = Math.floor(d % 36e5 / 6e4);
      const s = Math.floor(d % 6e4 / 1e3);
      document.getElementById('cd-d').textContent = String(dd).padStart(3, '0');
      document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
      document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
      document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>

</html>
