<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · VIBRATIONS 2027</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap');

    :root {
      --gold: #C9A84C;
      --gold2: #E8C96B;
      --crimson: #7A1C1C;
      --dark: #080404;
      --dark2: #120C0C;
      --dark3: #1C1010;
      --smoke: #F2E8D9;
      --smoke2: #D9C9B0;
      --muted: #8C7A65;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 50%, #2d1010 0%, #120808 50%, #080404 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Cormorant Garamond", serif;
      color: var(--smoke);
    }

    /* Logo Header */
    .login-logo {
      margin-bottom: 2rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeInDown 1s ease-out;
    }

    .login-logo img {
      height: 60px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(201, 168, 76, 0.3));
    }

    .login-logo .logo-text {
      display: flex;
      flex-direction: column;
    }

    .login-logo .nb-name {
      font-family: "Cinzel Decorative", cursive;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      line-height: 1;
    }

    .login-logo .nb-sub {
      font-family: "Cinzel", serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
      color: var(--smoke2);
      opacity: 0.8;
    }

    .vib-login-root {
      width: 100%;
      max-width: 450px;
      background: rgba(18, 12, 12, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 12px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .vib-hd {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(201, 168, 76, .025) 0, rgba(201, 168, 76, .025) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(-45deg, rgba(201, 168, 76, .025) 0, rgba(201, 168, 76, .025) 1px, transparent 1px, transparent 40px);
      pointer-events: none;
      opacity: 0.5;
    }

    .vib-cnt {
      position: relative;
      z-index: 1;
    }

    .vib-title-wrap {
      text-align: center;
      margin-bottom: 2rem;
    }

    .vib-top-sub {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .vib-main-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.2rem;
      margin: 0.5rem 0;
      background: linear-gradient(to bottom, var(--gold2), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
    }

    .vib-btm-sub {
      font-size: 0.9rem;
      color: var(--muted);
      font-style: italic;
    }

    .vib-tabs {
      display: flex;
      border-bottom: 1px solid rgba(201, 168, 76, 0.15);
      margin-bottom: 2rem;
    }

    .vib-tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--muted);
      position: relative;
    }

    .vib-tab.active {
      color: var(--gold);
    }

    .vib-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
    }

    .vib-form-group {
      margin-bottom: 1.5rem;
    }

    .vib-label {
      display: block;
      font-size: 0.7rem;
      font-family: 'Cinzel', serif;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .vib-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.2);
      padding: 0.8rem 1rem;
      color: var(--smoke);
      font-family: 'DM Sans', sans-serif;
      border-radius: 4px;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .vib-input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 15px rgba(201, 168, 76, 0.1);
    }

    .vib-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.75rem;
    }

    .vib-remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
    }

    .vib-forgot {
      color: var(--muted);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
      transition: color 0.3s;
    }

    .vib-forgot:hover {
      color: var(--gold);
    }

    .vib-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(45deg, #422a18, #2d1b0f);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.4s;
      text-transform: uppercase;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .vib-btn:hover {
      background: var(--gold);
      color: var(--dark);
      box-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
      transform: translateY(-2px);
    }

    .vib-sep {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 1px;
    }

    .vib-sep::before,
    .vib-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(201, 168, 76, 0.15);
      margin: 0 1rem;
    }

    .vib-google {
      width: 100%;
      padding: 0.8rem;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--smoke2);
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .vib-google:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .vib-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .vib-footer span {
      color: var(--gold);
      cursor: pointer;
      margin-left: 0.3rem;
    }

    .vib-msg {
      padding: 0.8rem;
      margin-bottom: 1.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s;
    }

    .vib-msg.success {
      background: rgba(0, 255, 0, 0.1);
      color: #8f8;
      border: 1px solid rgba(0, 255, 0, 0.2);
    }

    .vib-msg.error {
      background: rgba(255, 0, 0, 0.1);
      color: #f88;
      border: 1px solid rgba(255, 0, 0, 0.2);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let mode = 'login';

    function setMode(m) {
      mode = m;
      const loginTab = document.getElementById('tab-login');

      const signupConfirm = document.getElementById('signup-confirm');
      const loginOptions = document.getElementById('login-options');
      const btnSubmit = document.getElementById('btn-submit');
      const footer = document.getElementById('mode-footer');

      if (mode === 'login') {
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        signupFields.style.display = 'none';
        signupConfirm.style.display = 'none';
        loginOptions.style.display = 'flex';
        btnSubmit.textContent = 'Enter the Festival';
        footer.innerHTML = 'New to Vibrations? <span onclick="setMode(\'signup\')">Create an account</span>';
      } else {
        loginTab.classList.remove('active');
        signupTab.classList.add('active');
        signupFields.style.display = 'block';
        signupConfirm.style.display = 'block';
        loginOptions.style.display = 'none';
        btnSubmit.textContent = 'Join the Journey';
        footer.innerHTML = 'Already registered? <span onclick="setMode(\'login\')">Sign in instead</span>';

    function showMsg(text, type) {
      const msg = document.getElementById('vib-msg');
      msg.textContent = text;

    }

    function handleSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('inp-email').value.trim();
      const pass = document.getElementById('inp-password').value;

      if (!email || !pass) {
        showMsg('Please fill in all required fields.', 'error');
        return;
      }

      if (mode === 'signup') {
        const name = document.getElementById('inp-name').value.trim();
        const pass2 = document.getElementById('inp-pass2').value;
        if (!name) { showMsg('Please enter your full name.', 'error'); return; }
        if (pass !== pass2) { showMsg('Passwords do not match.', 'error'); return; }

        showMsg('Account created successfully! Welcome to Vibrations.', 'success');
        localStorage.setItem("isLoggedIn", "true");
        setTimeout(() => { window.location.href = "index.html"; }, 1000);
      } else {
        showMsg('Signed in successfully. Welcome back!', 'success');
        localStorage.setItem("isLoggedIn", "true");
        setTimeout(() => { window.location.href = "index.html"; }, 1000);
      }
    }

    function forgotPassword() {
      const email = document.getElementById('inp-email').value.trim();
      if (!email) { showMsg('Enter your email above to reset password.', 'error'); return; }
      showMsg('Password reset link sent to ' + email, 'success');
    }

    window.onload = () => {
